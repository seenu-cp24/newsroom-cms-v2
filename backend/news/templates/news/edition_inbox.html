{% extends "base.html" %}

{% block content %}

<h2>Edition Story Inbox</h2>

<table class="table table-bordered">

<tr>
<th>Title</th>
<th>Category</th>
<th>Reporter</th>
<th>Action</th>
</tr>

{% for article in articles %}

<tr>

<td>{{ article.title }}</td>
<td>{{ article.category.name }}</td>
<td>{{ article.reporter.username }}</td>

<td>

<a href="/edit-article/{{ article.id }}/"
class="btn btn-primary btn-sm">

Review

</a>

</td>

</tr>

{% empty %}

<tr>
<td colspan="4" class="text-center">
No stories received
</td>
</tr>

{% endfor %}

</table>

{% endblock %}
