{% extends "base.html" %}

{% block content %}

<h2>Create Article</h2>

<!-- 🔥 NEW: LANGUAGE SWITCH -->
<div class="mb-2">

<button type="button"
        class="btn btn-sm btn-primary"
        onclick="setLanguage('en-IN')">
English
</button>

<button type="button"
        class="btn btn-sm btn-success"
        onclick="setLanguage('te-IN')">
తెలుగు
</button>

</div>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="mb-3">

<label class="form-label"><b>AI Topic Generator (Real News)</b></label>

<input type="text"
       id="topic_input"
       class="form-control"
       placeholder="Enter topic (example: Iran Israel conflict)">

<br>

<button type="button"
        onclick="aiGenerateTopicArticle()"
        class="btn btn-dark">

Generate Verified Article

</button>

</div>


<div class="mb-3">

<label class="form-label">Title</label>

<div style="display:flex; gap:10px;">

<input type="text"
       id="title"
       name="title"
       class="form-control"
       required>

<button type="button"
        onclick="startTitleVoice()"
        class="btn btn-success">
🎤 Speak
</button>

</div>

</div>

<div class="mb-3">

<label class="form-label">Content</label>

<textarea id="content"
          name="content"
          rows="8"
          class="form-control"
          required></textarea>

<br>

<button type="button"
        onclick="startContentVoice()"
        class="btn btn-success">
🎤 Speak Content
</button>

<button type="button"
        onclick="stopContentVoice()"
        class="btn btn-danger">
⏹ Stop
</button>

<button type="button"
        onclick="formatTeluguText()"
        class="btn btn-primary">
🧹 Format Content
</button>

<br><br>

<button type="button" onclick="aiImprove()" class="btn btn-info">
AI Improve Article
</button>

<button type="button" onclick="aiHeadline()" class="btn btn-warning">
Generate Headline
</button>

<button type="button" onclick="aiWriteArticle()" class="btn btn-secondary">
AI Write Article
</button>

</div>


<div class="mb-3">

<label class="form-label">Category</label>

<select name="category" class="form-select">

{% for category in categories %}
<option value="{{ category.id }}">{{ category.name }}</option>
{% endfor %}

</select>

</div>


<h4 class="mt-4">Upload Images</h4>

<div class="mb-3">

<label class="form-label">Select Images</label>

<input type="file" name="images" multiple class="form-control">

</div>


<div class="mb-3">

<label class="form-label">Image Caption</label>

<input type="text" name="caption" class="form-control">

</div>


<button type="submit" class="btn btn-primary">Submit Article</button>

<a href="/reporter-dashboard/" class="btn btn-secondary">Cancel</a>

</form>


<script>

// 🔥 NEW GLOBAL LANGUAGE VARIABLE
let currentLang = "en-IN";

// 🔥 LANGUAGE SWITCH FUNCTION
function setLanguage(lang) {
    currentLang = lang;

    if (lang === "te-IN") {
        alert("Telugu voice enabled");
    } else {
        alert("English voice enabled");
    }
}


// EXISTING FUNCTIONS (UNCHANGED)

function getCookie(name) {
let cookieValue = null;
if (document.cookie && document.cookie !== '') {
const cookies = document.cookie.split(';');
for (let i = 0; i < cookies.length; i++) {
const cookie = cookies[i].trim();
if (cookie.substring(0, name.length + 1) === (name + '=')) {
cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
break;
}
}
}
return cookieValue;
}


// =======================
// VOICE FUNCTIONS UPDATED
// =======================

function startTitleVoice() {

    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert("Voice recognition not supported. Use Chrome.");
        return;
    }

    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    var recognition = new SpeechRecognition();

    recognition.lang = currentLang;  // 🔥 UPDATED
    recognition.interimResults = false;

    recognition.onstart = function(){
        alert("Listening... Speak now");
    };

    recognition.onresult = function(event) {
        document.getElementById("title").value =
        event.results[0][0].transcript;
    };

    recognition.onerror = function(event){
        alert("Voice error: " + event.error);
    };

    recognition.start();
}


let contentRecognition;
let isListening = false;
let lastFinalText = "";

function startContentVoice() {

    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert("Voice not supported. Use Chrome.");
        return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    contentRecognition = new SpeechRecognition();

    contentRecognition.lang = currentLang;
    contentRecognition.continuous = true;
    contentRecognition.interimResults = false;

    isListening = true;

    contentRecognition.onresult = function(event) {

        let textarea = document.getElementById("content");

        for (let i = event.resultIndex; i < event.results.length; i++) {

            if (event.results[i].isFinal) {

                let newText = event.results[i][0].transcript.trim();

                // 🔥 FORMAT TEXT FIRST
                let formattedText = newText
                    .replace(/ full stop| పూర్తి విరామం/gi, ".")
                    .replace(/ comma| కామా/gi, ",")
                    .replace(/ new line| కొత్త లైన్/gi, "\n");

                // 🔥 PREVENT DUPLICATE USING FORMATTED TEXT
                if (formattedText !== lastFinalText) {

                    textarea.value += formattedText + " ";
                    lastFinalText = formattedText;
                }
            }
        }
    };

    contentRecognition.onerror = function(event){
        console.log("Error:", event.error);
    };

    contentRecognition.onend = function() {
        if (isListening) {
            contentRecognition.start();
        }
    };

    contentRecognition.start();
}

function stopContentVoice() {

    isListening = false;

    if (contentRecognition) {
        contentRecognition.onend = null;
        contentRecognition.stop();
    }
}

function formatTeluguText() {

    let textarea = document.getElementById("content");
    let text = textarea.value;

    // 🔥 Step 1: Normalize spaces
    text = text.replace(/\s+/g, " ").trim();

    // 🔥 Step 2: Add line break after long sentences (safe split)
    text = text.replace(/(.{80,120})\s/g, "$1\n");

    // 🔥 Step 3: Fix spacing around punctuation
    text = text.replace(/\s+\./g, ".");
    text = text.replace(/\.\s*/g, ".\n");

    textarea.value = text.trim();
}

</script>

{% endblock %}
